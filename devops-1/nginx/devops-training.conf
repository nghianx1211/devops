# /etc/nginx/sites-available/devops-training.conf
# Symlink: ln -s /etc/nginx/sites-available/devops-training.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;          # Thay bằng domain thực nếu có, VD: devops.example.com

    # ───── Gzip compression ─────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # ───── Frontend static files ─────
    root /opt/devops-training-app/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ───── Backend API reverse proxy ─────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ───── Health check endpoint ─────
    location /health {
        proxy_pass http://127.0.0.1:3000/api/health;
        access_log off;
    }

    # ───── Security headers ─────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ───── Ẩn phiên bản Nginx ─────
    server_tokens off;

    # ───── Access log ─────
    access_log /var/log/nginx/devops-training-access.log;
    error_log  /var/log/nginx/devops-training-error.log warn;
}

