<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps Training</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 60px 80px;
      text-align: center;
      max-width: 700px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .logo {
      font-size: 56px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 16px;
      color: #e0f7fa;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .subtitle {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 40px;
    }

    .badges {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .badge {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 0.85rem;
      color: #b2ebf2;
    }

    .status-panel {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 20px 24px;
      text-align: left;
    }

    .status-panel h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 14px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .status-row:last-child {
      border-bottom: none;
    }

    .status-row .label {
      color: rgba(255,255,255,0.5);
    }

    .status-row .value {
      color: #80cbc4;
      font-weight: 500;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      background: #4caf50;
      animation: pulse 2s infinite;
    }

    .dot.error {
      background: #f44336;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .loading {
      color: rgba(255,255,255,0.4);
      font-style: italic;
    }

    footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🚀</div>
    <h1 id="main-message" class="loading">Đang tải...</h1>
    <p class="subtitle">Nền tảng học tập vận hành hệ thống hiện đại</p>

    <div class="badges">
      <span class="badge">🐧 Linux</span>
      <span class="badge">🐳 Docker</span>
      <span class="badge">⚙️ CI/CD</span>
      <span class="badge">☸️ Kubernetes</span>
      <span class="badge">📊 Monitoring</span>
    </div>

    <div class="status-panel">
      <h2>Trạng thái hệ thống</h2>
      <div class="status-row">
        <span class="label">Backend API</span>
        <span class="value" id="api-status"><span class="dot"></span>Đang kiểm tra...</span>
      </div>
      <div class="status-row">
        <span class="label">Database</span>
        <span class="value" id="db-status"><span class="dot"></span>Đang kiểm tra...</span>
      </div>
      <div class="status-row">
        <span class="label">Python version</span>
        <span class="value" id="node-version">—</span>
      </div>
      <div class="status-row">
        <span class="label">Uptime</span>
        <span class="value" id="uptime">—</span>
      </div>
    </div>
  </div>

  <footer>DevOps Training App &mdash; 2026</footer>

  <script>
    const API_BASE = "/api";

    async function fetchMessage() {
      try {
        const res = await fetch(`${API_BASE}/message`);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        const el = document.getElementById("main-message");
        el.textContent = data.message;
        el.classList.remove("loading");
      } catch (e) {
        const el = document.getElementById("main-message");
        el.textContent = "Chào mừng bạn đến với khoá DevOps Training!";
        el.classList.remove("loading");
      }
    }

    async function fetchInfo() {
      try {
        const res = await fetch(`${API_BASE}/info`);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        document.getElementById("api-status").innerHTML =
          '<span class="dot"></span>Online';
        document.getElementById("db-status").innerHTML =
          '<span class="dot"></span>Kết nối';
        document.getElementById("node-version").textContent = data.python_version || "—";
        const uptime = data.uptime_seconds;
        const h = Math.floor(uptime / 3600);
        const m = Math.floor((uptime % 3600) / 60);
        const s = uptime % 60;
        document.getElementById("uptime").textContent =
          `${h}h ${m}m ${s}s`;
      } catch (e) {
        document.getElementById("api-status").innerHTML =
          '<span class="dot error"></span>Offline';
        document.getElementById("db-status").innerHTML =
          '<span class="dot error"></span>Không kết nối';
      }
    }

    fetchMessage();
    fetchInfo();
    // Refresh trạng thái mỗi 30 giây
    setInterval(fetchInfo, 30000);
  </script>
</body>
</html>
